# Render blueprint — AeroPDF backend (FastAPI + PyMuPDF).
# Deploy: https://render.com → New → Blueprint → point at this repo.
# The frontend is deployed separately on Vercel (see vercel.json).

services:
  - type: web
    name: aeropdf-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Comma-separated list of allowed CORS origins (no trailing slash).
      # Add preview URLs separated by commas if needed.
      - key: AEROPDF_ALLOWED_ORIGINS
        value: https://proeditorfree.vercel.app
      - key: AEROPDF_JSON_LOGS
        value: "true"
    # Free plan: no persistent disk — sessions are ephemeral.
    # Upgrade to paid + uncomment to persist undo/redo history across restarts:
    #   envVars:
    #     - key: AEROPDF_TEMP_DIR
    #       value: /var/data/aeropdf_sessions
    #   disk:
    #     name: aeropdf-data
    #     mountPath: /var/data
    #     sizeGB: 1
